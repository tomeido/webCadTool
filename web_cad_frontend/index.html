<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web3 Rust CAD Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="app">
    <!-- High-performance Rust WebGL Canvas Target -->
    <canvas id="cad-canvas"></canvas>

    <!-- Glassmorphism UI Overlay -->
    <div class="ui-layer">

      <!-- Header -->
      <header class="glass-panel main-header">
        <div class="brand">
          <div class="logo-icon"></div>
          <h1>RustXYZ CAD</h1>
        </div>
        <div class="header-controls">
          <span id="network-status" class="network-badge status-disconnected">Disconnected</span>
          <button id="connect-wallet-btn" class="btn-primary">Connect Wallet</button>
        </div>
      </header>

      <!-- Tool Palette Sidebar -->
      <aside class="glass-panel sidebar">
        <div class="tool-group">
          <h3 class="group-title">Transform</h3>
          <button class="tool-btn active" data-tool="select">Select</button>
          <button class="tool-btn" data-tool="move">Translate</button>
          <button class="tool-btn" data-tool="rotate">Rotate</button>
          <button class="tool-btn" data-tool="scale">Scale</button>
        </div>

        <div class="tool-group">
          <h3 class="group-title">Primitives</h3>
          <button class="tool-btn" data-tool="cube">+ Cube</button>
          <button class="tool-btn" data-tool="sphere">+ Sphere</button>
          <button class="tool-btn" data-tool="cylinder">+ Cylinder</button>
        </div>

        <div class="tool-group last">
          <h3 class="group-title">Version Control</h3>
          <button class="tool-btn" data-tool="commit" id="commit-btn">Commit locally</button>
          <button class="tool-btn btn-mint" data-tool="mint" id="mint-btn">Mint / Push to Web3</button>
          <div id="history-panel" class="history-panel">
            <h4>Local History</h4>
            <ul id="commit-list">
              <!-- Commits will go here -->
            </ul>
          </div>
          <button class="tool-btn" data-tool="export">Export STL</button>
        </div>
      </aside>

      <!-- Bottom Bar -->
      <footer class="glass-panel bottom-bar">
        <div class="status-text">Ready.</div>
        <div class="coordinates">
          X: <span id="coord-x">0.00</span>
          Y: <span id="coord-y">0.00</span>
          Z: <span id="coord-z">0.00</span>
        </div>
      </footer>

    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
